name: Generate Blog Post

on:
  schedule:
    - cron: "0 2 * * 1"   # Every Monday 8:00 AM Bangladesh (UTC+6)
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate blog post via OpenRouter
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          DATETIME=$(date -u +%Y-%m-%dT%H:%M:%S+06:00)

          PROMPT="You are a blog writer for OfBuilder, an indie mobile app studio. Write a weekly blog post for this week ($DATE). Pick one of these topics: OfBuilder app update or feature highlight (DreamNest AI, Driving Theory Test UK, Mental Math Master, My Expenses), AI news for mobile users, tech tip for Flutter or mobile UX, indie app development insight. Return ONLY a valid JSON object with these exact fields: slug (kebab-case string like $DATE-my-title), title, excerpt (one sentence), category (one of: Studio News, AI News, Tech Tips, App Update, Dev Insights), body (3-4 paragraphs separated by newline newline). No text outside the JSON object."

          RESPONSE=$(curl -s https://openrouter.ai/api/v1/chat/completions \
            -H "Authorization: Bearer $OPENROUTER_API_KEY" \
            -H "Content-Type: application/json" \
            -H "HTTP-Referer: https://ofbuilder.com" \
            -H "X-Title: OfBuilder Blog" \
            -d "{\"model\": \"openai/gpt-4o-mini\", \"messages\": [{\"role\": \"user\", \"content\": $(python3 -c "import json,sys; print(json.dumps(sys.argv[1]))" "$PROMPT")}]}")

          echo "$RESPONSE" > /tmp/api_response.json
          echo "$DATETIME" > /tmp/datetime.txt

          python3 scripts/parse_blog_post.py

      - name: Commit and push
        run: |
          git config user.name "ofbuilder-bot"
          git config user.email "hello@ofbuilder.com"
          git add content/blog/
          git diff --staged --quiet || git commit -m "blog: scheduled post $(date -u +%Y-%m-%d) $(date -u +%H:%M) UTC"
          git push
