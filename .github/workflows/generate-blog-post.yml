name: Generate Blog Post

on:
  schedule:
    - cron: "0 2 * * *"   # 8:00 AM Bangladesh (UTC+6)
    - cron: "0 14 * * *"  # 8:00 PM Bangladesh (UTC+6)
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate blog post via OpenRouter
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          HOUR=$(date -u +%H)
          if [ "$HOUR" = "02" ]; then
            SESSION="morning"
          else
            SESSION="evening"
          fi

          DATE=$(date -u +%Y-%m-%d)
          DATETIME=$(date -u +%Y-%m-%dT%H:%M:%S+06:00)

          PROMPT="You are a blog writer for OfBuilder, an indie mobile app studio. Write a $SESSION blog post for today ($DATE). Pick one of these topics: OfBuilder app update or feature highlight, AI news relevant to mobile users, tech tip for Flutter or mobile UX, indie app development insight. Return ONLY a valid JSON object with these exact fields: slug (kebab-case string including the date like $DATE-my-title), title (string), excerpt (one sentence string), category (one of: Studio News, AI News, Tech Tips, App Update, Dev Insights), body (string with 3-4 paragraphs separated by \\n\\n). No text outside the JSON."

          RESPONSE=$(curl -s https://openrouter.ai/api/v1/chat/completions \
            -H "Authorization: Bearer $OPENROUTER_API_KEY" \
            -H "Content-Type: application/json" \
            -H "HTTP-Referer: https://ofbuilder.com" \
            -H "X-Title: OfBuilder Blog" \
            -d "{\"model\": \"openai/gpt-4o-mini\", \"messages\": [{\"role\": \"user\", \"content\": $(echo "$PROMPT" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))')}]}")

          echo "API Response: $RESPONSE"

          python3 << EOF
          import json, sys

          response = '''$RESPONSE'''
          data = json.loads(response)

          if 'error' in data:
              print("API Error:", data['error'])
              sys.exit(1)

          content = data['choices'][0]['message']['content'].strip()

          # Strip markdown code fences if present
          if content.startswith('\`\`\`'):
              lines = content.split('\n')
              lines = lines[1:]  # remove first line (```json)
              if lines[-1].strip() == '\`\`\`':
                  lines = lines[:-1]
              content = '\n'.join(lines)

          post = json.loads(content)
          post['date'] = '$DATETIME'

          filename = 'content/blog/' + post['slug'] + '.json'
          with open(filename, 'w') as f:
              json.dump(post, f, indent=2)
          print('Written: ' + filename)
          EOF

      - name: Commit and push
        run: |
          git config user.name "ofbuilder-bot"
          git config user.email "hello@ofbuilder.com"
          git add content/blog/
          git diff --staged --quiet || git commit -m "blog: scheduled post $(date -u +%Y-%m-%d) $(date -u +%H:%M) UTC"
          git push
