name: Generate Blog Post

on:
  schedule:
    - cron: "0 2 * * *"   # 8:00 AM Bangladesh (UTC+6)
    - cron: "0 14 * * *"  # 8:00 PM Bangladesh (UTC+6)
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate blog post via OpenRouter
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          HOUR=$(date -u +%H)
          if [ "$HOUR" = "02" ]; then
            SESSION="morning"
          else
            SESSION="evening"
          fi

          DATE=$(date -u +%Y-%m-%d)
          DATETIME=$(date -u +%Y-%m-%dT%H:%M:%S+06:00)

          TOPICS='["OfBuilder app update or feature highlight (DreamNest AI, Driving Theory Test UK, Mental Math Master, My Expenses, IlmAI, NurseUp, Shishu AI, SleepWise AI)", "AI news relevant to mobile app users or indie developers", "Tech tip for Flutter, Next.js, or mobile UX", "Indie app development insight or lesson", "AI-powered app trend or use case"]'

          RESPONSE=$(curl -s https://openrouter.ai/api/v1/chat/completions \
            -H "Authorization: Bearer $OPENROUTER_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{
              \"model\": \"openai/gpt-4o-mini\",
              \"messages\": [{
                \"role\": \"user\",
                \"content\": \"You are a blog writer for OfBuilder, an indie mobile app studio. Write a $SESSION blog post for today ($DATE). Pick one topic from: $TOPICS. Return ONLY a valid JSON object with these fields: slug (kebab-case, unique, include date like 2026-06-26-my-title), title, excerpt (1 sentence), category (one of: Studio News, AI News, Tech Tips, App Update, Dev Insights), body (3-4 paragraphs separated by double newlines, no markdown headers, bold with **word** is ok). Do not include any text outside the JSON.\"
              }]
            }")

          echo "$RESPONSE" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          content = data['choices'][0]['message']['content'].strip()
          # strip markdown code fences if present
          if content.startswith('\`\`\`'):
              content = content.split('\`\`\`')[1]
              if content.startswith('json'):
                  content = content[4:]
          post = json.loads(content)
          post['date'] = '$DATETIME'
          filename = 'content/blog/$DATE-' + post['slug'].replace('$DATE-','').replace('2026-06-26-','') + '.json'
          # use slug as filename base
          filename = 'content/blog/' + post['slug'] + '.json'
          with open(filename, 'w') as f:
              json.dump(post, f, indent=2)
          print('Written: ' + filename)
          "

      - name: Commit and push
        run: |
          git config user.name "ofbuilder-bot"
          git config user.email "hello@ofbuilder.com"
          git add content/blog/
          git diff --staged --quiet || git commit -m "blog: scheduled post $(date -u +%Y-%m-%d\ %H:%M) UTC"
          git push
